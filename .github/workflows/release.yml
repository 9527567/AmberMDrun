name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build sdist & wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build source distribution
        run: |
          python -m pip install --upgrade build twine
          python -m build --sdist

      - name: Build wheels (cp39-cp314, manylinux2014/glibc 2.17, x86_64)
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: x86_64
          CIBW_OUTPUT_DIR: wheelhouse/
          CIBW_BUILD_FRONTEND: build

      - name: Merge distributions
        run: |
          mkdir -p dist
          cp wheelhouse/* dist/

      - name: Check distributions
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@v1.12.2

  conda:
    name: Build and publish conda package
    runs-on: ubuntu-latest
    environment: ANACONDA_TOKEN
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"

      - name: Build conda package
        run: |
          conda install -c conda-forge conda-build anaconda-client
          export AMBERMDRUN_VERSION=$(python -c "import re; print(re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', open('AmberMDrun/version.py').read()).group(1))")
          conda-build -c conda-forge conda.recipe --output-folder conda-bld
          mkdir -p dist
          find conda-bld -type f \( -name '*.conda' -o -name '*.tar.bz2' \) -exec cp {} dist/ \;

      - name: Check Anaconda token
        env:
          ANACONDA_SECRET_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
          ANACONDA_VARIABLE_TOKEN: ${{ vars.ANACONDA_TOKEN }}
        run: |
          if [ -n "$ANACONDA_SECRET_TOKEN" ]; then
            echo "Using ANACONDA_TOKEN from GitHub Actions secret."
            echo "ANACONDA_TOKEN=$ANACONDA_SECRET_TOKEN" >> "$GITHUB_ENV"
          elif [ -n "$ANACONDA_VARIABLE_TOKEN" ]; then
            echo "Using ANACONDA_TOKEN from GitHub Actions variable."
            echo "ANACONDA_TOKEN=$ANACONDA_VARIABLE_TOKEN" >> "$GITHUB_ENV"
          else
            echo "ANACONDA_TOKEN was not available to this workflow run."
            echo "Check that it is an Actions repository secret, not a Codespaces/Dependabot secret or an environment secret without a matching job environment."
            exit 1
          fi

      - name: Upload conda package to Anaconda
        run: anaconda --token "$ANACONDA_TOKEN" upload --user zjack --label main --force dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: dist/

  release:
    name: Create GitHub Release
    needs: [build, conda]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: conda-package
          path: dist/

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          generateReleaseNotes: true
          name: AmberMDrun ${{ github.ref_name }}
