package:
  name: ambermdrun
  version: 0.0.7

source:
  path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed .

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - cmake
    - ninja
    - python
    - setuptools
  host:
    - python
    - pip !=22.1.0
  run:
    - python
    - pandas >=1.0.0

outputs:
  - name: ambermdrun
    files:
      - AmberMDrun/
      - AmberMDrun-*

  - name: ambermdrun-docs
    requirements:
      build:
        - doxygen
      host:
        - python
    script:
      - doxygen Doxyfile
      - mkdir -p $PREFIX/share/doc/ambermdrun
      - cp -r html/* $PREFIX/share/doc/ambermdrun/

about:
  summary: A scripting tool for running Amber MD in an easy way
  license: MIT
  license_family: MIT
  license_file: LICENSE
  home: https://github.com/9527567/AmberMDrun
  dev_url: https://github.com/9527567/AmberMDrun
